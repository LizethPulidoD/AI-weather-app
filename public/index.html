<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Weather App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <h1>🌤️ Weather App</h1>

    <input type="text" id="city" placeholder="Ingresa una ciudad" />

    <select id="type">
      <option value="current">Clima actual</option>
      <option value="forecast">Pronóstico 5 días</option>
    </select>

    <button onclick="getWeather()">Consultar</button>

    <div id="result"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
